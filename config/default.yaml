# Brain - Default Configuration
# Override with ~/.brain/config.yaml or environment variables

brain:
  version: "0.1.0"
  data_dir: "~/.brain"

storage:
  ruvector_path: "~/.brain/ruvector/"
  sqlite_path: "~/.brain/db/brain.db"
  hnsw:
    ef_construction: 200
    m: 16
    ef_search: 50

llm:
  provider: "ollama"
  model: "qwen2.5-coder:7b"
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 4096

embedding:
  model: "nomic-embed-text"    # must be pulled: `ollama pull nomic-embed-text`
  dimensions: 768              # must match the model output size (nomic-embed-text → 768)

memory:
  episodic:
    max_entries: 100000
    retention_days: 365
  semantic:
    similarity_threshold: 0.65
    max_results: 20
  search:
    hybrid_weight: 0.7         # Weight for vector search (1-weight for BM25)
    rrf_k: 60                  # RRF fusion parameter
  consolidation:
    enabled: true
    interval_hours: 24
    forgetting_threshold: 0.05 # Memories below this are candidates for pruning

encryption:
  enabled: false               # Run `brain init --encrypt` to generate a salt and enable

security:
  exec_allowlist:
    - ls
    - cat
    - grep
    - find
    - git
    - cargo
    - rustc
  exec_timeout_seconds: 30

actions:
  web_search:
    enabled: true
    provider: "searxng"       # searxng | tavily | custom
    endpoint: "http://localhost:8888"  # SearXNG default; override for your instance
    api_key: ""               # Required for tavily provider
    timeout_ms: 3000
    default_top_k: 5
  scheduling:
    enabled: false
    mode: "persist_only"      # Persist intents only; no internal cron runner
  messaging:
    enabled: false
    timeout_ms: 3000
    channels: {}              # map channel -> ntfy topic or webhook URL (e.g. {"alerts":"brain-alerts"})

proactivity:
  enabled: false               # Opt-in
  max_per_day: 5
  min_interval_minutes: 60
  quiet_hours:
    start: "22:00"
    end: "08:00"

adapters:
  http:
    enabled: true
    host: "127.0.0.1"
    port: 19789
    cors: true
  ws:
    enabled: true
    port: 19790
  mcp:
    enabled: true
    stdio: true
    http: true
    port: 19791
  grpc:
    enabled: true
    port: 19792

access:
  api_keys:
    - key: "demokey123"
      name: "Demo Key"
      permissions:
        - read
        - write
